server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/neu_library}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  google:
    client-id: ${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com}
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_use_a_base64_encoded_256bit_key}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  allowed-domain: neu.edu.ph
  super-admin-email: ${SUPER_ADMIN_EMAIL:borisgamaliel.duque@neu.edu.ph}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5000,http://localhost:8080}
  storage:
    bucket: ${GCS_BUCKET:neu-library-uploads}
